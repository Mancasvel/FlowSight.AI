<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowSight DEV Agent</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    /* ... (Existing styles simplified) ... */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #2563eb;
      --success: #16a34a;
      --error: #dc2626;
      --warning: #d97706;
      --bg: #f8fafc;
      --surface: #fff;
      --text: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn-error {
      background: var(--error);
      color: white;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat {
      text-align: center;
      padding: 12px;
      background: var(--bg);
      border-radius: 8px;
    }

    .stat-value {
      font-size: 24px;
    }

    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .activity-list {
      max-height: 400px;
      overflow-y: auto;
    }

    .activity-item {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: var(--bg);
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
    }

    .status-dot.ok {
      background: var(--success);
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>FlowSight Agent</h1>
    <div style="font-size: 12px; color: var(--text-secondary);">Standalone Mode</div>
  </div>

  <div class="container">
    <!-- Status Card -->
    <div class="card">
      <div class="card-title"><span class="material-icons">dns</span> System Status</div>
      <div class="status-row">
        <div class="status-dot" id="ollamaDot"></div>
        <span class="status-text" id="ollamaStatus">Checking Ollama...</span>
      </div>
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="devName" placeholder="John Doe">
      </div>
    </div>

    <!-- Monitoring Card -->
    <div class="card">
      <div class="card-title"><span class="material-icons">play_circle</span> Monitoring</div>
      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="statStatus">Off</div>
          <div class="stat-label">Status</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="statSent">0</div>
          <div class="stat-label">Reports</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="statInterval">30s</div>
          <div class="stat-label">Interval</div>
        </div>
      </div>
      <div class="form-group">
        <label>Current Task</label>
        <input type="text" id="currentTask" placeholder="e.g. Refactoring Agent">
      </div>
      <div class="btn-group">
        <button class="btn btn-success" id="startBtn"><span class="material-icons">play_arrow</span> Start</button>
        <button class="btn btn-error" id="stopBtn"><span class="material-icons">stop</span> Stop</button>
        <button class="btn btn-outline" id="captureBtn"><span class="material-icons">camera_alt</span> Capture
          Now</button>
      </div>
    </div>

    <!-- Activity Card -->
    <div class="card">
      <div class="card-title"><span class="material-icons">history</span> Local Activity Feed</div>
      <div class="activity-list" id="activityList">
        <div class="empty" style="text-align: center; padding: 20px;">No activity yet.</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { invoke } from 'https://esm.sh/@tauri-apps/api@2.0.0/core';

    // No Supabase, No PM Connection

    function getDeviceId() {
      let id = localStorage.getItem('fsk_device_id');
      if (!id) {
        id = 'dev-' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('fsk_device_id', id);
      }
      return id;
    }

    function log(msg) {
      console.log("[Agent]", msg);
    }

    // ============ CONFIG ============

    async function loadConfig() {
      const config = await invoke('get_config');
      document.getElementById('devName').value = config.devName || '';
      document.getElementById('statInterval').textContent = (config.captureInterval || 30000) / 1000 + 's';
    }

    async function saveConfig() {
      await invoke('update_config', {
        config: {
          devName: document.getElementById('devName').value,
          captureInterval: 30000,
          visionModel: 'qwen3-vl:2b'
        }
      });
    }

    // ============ MONITORING LOOP ============

    document.getElementById('startBtn').onclick = async () => {
      isMonitoring = true;
      document.getElementById('statStatus').textContent = 'On';
      document.getElementById('statStatus').style.color = 'var(--success)';

      // Initial capture
      captureAndAnalyze();

      const intervalMs = 30000;
      monitoringInterval = setInterval(captureAndAnalyze, intervalMs);
    };

    document.getElementById('stopBtn').onclick = () => {
      isMonitoring = false;
      document.getElementById('statStatus').textContent = 'Off';
      document.getElementById('statStatus').style.color = 'inherit';
      if (monitoringInterval) clearInterval(monitoringInterval);
    };

    document.getElementById('captureBtn').onclick = captureAndAnalyze;

    // Check Ollama Loop
    async function checkOllama() {
      try {
        const status = await invoke('check_ollama');
        const dot = document.getElementById('ollamaDot');
        const txt = document.getElementById('ollamaStatus');
        if (status.online) {
          if (status.hasVisionModel) {
            dot.className = 'status-dot ok';
            txt.textContent = 'Ollama Ready';
          } else {
            dot.className = 'status-dot warn';
            txt.textContent = 'Ollama Online (Missing Model)';
          }
        } else {
          dot.className = 'status-dot error';
          txt.textContent = 'Ollama Offline';
        }
      } catch (e) { console.error(e); }
    }
    setInterval(checkOllama, 5000);
    checkOllama();
    loadConfig();

    async function captureAndAnalyze() {
      const btn = document.getElementById('captureBtn');
      if (btn) { btn.disabled = true; btn.innerHTML = '<span class="loading"></span>'; }

      try {
        log("Taking Context Snapshot...");

        const task = document.getElementById('currentTask').value || "General Work";

        // SINGLE CALL: Capture + Context Analysis
        const snapshot = await invoke('capture_context_snapshot', { userTask: task });

        log(`Snapshot description ready: ${snapshot.description.substring(0, 50)}...`);

        // Update UI logic (Local Feed)
        const devName = document.getElementById('devName').value || 'Developer';
        addActivityItem(devName, snapshot.description);

        document.getElementById('statSent').textContent = parseInt(document.getElementById('statSent').textContent) + 1;

      } catch (e) {
        console.error(e);
        log("Error: " + e);
      }

      if (btn) { btn.disabled = false; btn.innerHTML = '<span class="material-icons">camera_alt</span> Capture Now'; }
    }

    function addActivityItem(devName, desc) {
      const list = document.getElementById('activityList');
      const div = document.createElement('div');
      div.className = 'activity-item';
      // Truncate desc for UI
      const shortDesc = desc && desc.length > 100 ? desc.substring(0, 100) + "..." : desc;

      div.innerHTML = `
        <div class="activity-time">${new Date().toLocaleTimeString()}</div>
        <div class="activity-desc">
           <strong>${devName}</strong><br>
           <span style="font-size:11px; color:#555;">${shortDesc}</span>
           <br>
           <span class="activity-badge synced">Archived Locally</span>
        </div>
      `;
      list.insertBefore(div, list.firstChild);
    }
  </script>
</body>

</html>
